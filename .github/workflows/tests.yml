name: Run Tests

on:
  push:
    branches: [ main ]

jobs:

  api-tests:
    name: API Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install
          playwright install-deps

      - name: Run API tests (ALL)
        run: dotnet test --filter "Layer=API" --logger "trx"

      - name: Upload API results
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: '**/TestResults/*.trx'


  ui-smoke:
    name: UI Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install
          playwright install-deps

      - name: Run UI smoke tests
        run: dotnet test --filter "Layer=UI&Type=Smoke" --logger "trx"

      - name: Upload UI results
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: '**/TestResults/*.trx'